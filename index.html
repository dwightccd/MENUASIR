<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME // Menú</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-dimmer: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    max-width: 820px;
    padding: 28px 24px 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dimmer);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .container {
    width: 100%;
    max-width: 820px;
    padding: 24px 24px 60px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 14px;
    margin-top: 8px;
  }

  .module-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  .module-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .module-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .module-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .module-card:hover::before {
    opacity: 1;
  }

  .mod-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .mod-name {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
    line-height: 1.35;
  }

  .mod-count {
    font-size: 0.7rem;
    color: var(--text-dimmer);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .footer-note {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dimmer);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 560px) {
    .module-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>HOME // Menú</h1>
  <span>Acceso rápido a los test de las asignaturas =)</span>
</div>

<div class="container">
  <p class="section-title">Seleccionar página</p>

  <div class="module-grid">
    <a class="module-card" href="https://dwightccd.github.io/IAW2026/" target="_blank">
      <div class="mod-code">IAW2026</div>
      <div class="mod-name">Implantación de Aplicaciones Web</div>
      <div class="mod-count">Abrir sitio web</div>
    </a>

    <a class="module-card" href="https://dwightccd.github.io/SAD2026/" target="_blank">
      <div class="mod-code">SAD2026</div>
      <div class="mod-name">Seguridad y Alta Disponibilidad</div>
      <div class="mod-count">Abrir sitio web</div>
    </a>
  </div>

  <div class="footer-note">Portal principal</div>
</div>

</body>
</html>
